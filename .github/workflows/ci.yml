name: CI

on:
  push:
    branches: ["main", "develop", "feature/**", "fix/**", "chore/**"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint & Type-check ────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  # ─── Test matrix ──────────────────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18.x", "20.x", "22.x"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.js   || (echo "dist/index.js missing"  && exit 1)
          test -f dist/cli.js     || (echo "dist/cli.js missing"    && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts missing" && exit 1)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-node20
          path: dist/
          retention-days: 7

  # ─── Demo files parse check ───────────────────────────────────────────────
  demo-sanity:
    name: Demo files parse check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-node20
          path: dist/

      - name: Parse all demo files
        run: |
          echo "=== small/config.json ===" && node dist/cli.js demos/small/config.json --no-color --no-stats
          echo "=== small/user.json ===" && node dist/cli.js demos/small/user.json --no-color --no-stats
          echo "=== large/products.json ===" && node dist/cli.js demos/large/products.json --no-color --no-stats --max-depth 2
          echo "=== large/analytics.json ===" && node dist/cli.js demos/large/analytics.json --no-color --no-stats --max-depth 2

      - name: Ensure CLI exits 0 on valid JSON
        run: |
          echo '{"ok":true}' | node dist/cli.js /dev/stdin --no-color --no-stats --stdin; test $? -eq 0

      - name: Ensure CLI exits 1 on invalid JSON
        run: |
          echo '{"broken":}' | node dist/cli.js /dev/stdin --no-color --no-stats --stdin; test $? -eq 1

  # ─── Summary gate ─────────────────────────────────────────────────────────
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, build, demo-sanity]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint-and-typecheck.result }}" != "success" ||
                "${{ needs.test.result }}"              != "success" ||
                "${{ needs.build.result }}"             != "success" ||
                "${{ needs.demo-sanity.result }}"       != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed!"
