name: PR Check

on:
  pull_request:
    branches: ["main", "develop"]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # Guard: skip draft PRs
  skip-draft:
    name: Skip draft check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - run: echo "PR is ready for review, running checks"

  # Enforce: PR title follows Conventional Commits
  pr-title:
    name: PR title lint
    runs-on: ubuntu-latest
    needs: skip-draft
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            ci
            revert
          requireScope: false

  # Enforce: no parser regression
  regression-guard:
    name: Parser regression guard
    runs-on: ubuntu-latest
    needs: skip-draft

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run parser regression tests
        run: npx jest --testPathPattern="json.parser|pipeline" --ci

      - name: Parse every demo file
        run: |
          for f in demos/**/*.json; do
            echo "Checking $f ..."
            npx ts-node src/cli.ts "$f" --no-color --no-stats > /dev/null
            if [ $? -ne 0 ]; then
              echo "FAIL: $f failed to parse"
              exit 1
            fi
          done
          echo "All demo files parsed successfully"

  # Enforce: coverage must not drop
  coverage-gate:
    name: Coverage gate
    runs-on: ubuntu-latest
    needs: skip-draft

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage enforcement
        run: npm run test:coverage
