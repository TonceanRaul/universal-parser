name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  packages: write

jobs:
  # ─── Run full CI first ────────────────────────────────────────────────────
  ci-check:
    name: CI Check before release
    uses: ./.github/workflows/ci.yml

  # ─── Publish to npm ───────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: ci-check
    environment: npm-publish

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Bump package.json version
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Create GitHub Release ────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-npm

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Extract the section for this version from CHANGELOG.md if present
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release-notes.md
          else
            echo "Release $VERSION" > release-notes.md
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build dist for release artifact
        run: |
          npm ci
          npm run build

      - name: Package release artifact
        run: |
          tar -czf universal-parser-${{ steps.changelog.outputs.version }}.tar.gz dist/ package.json README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.changelog.outputs.version }}"
          body_path: release-notes.md
          files: universal-parser-${{ steps.changelog.outputs.version }}.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Add format extension guide (future-proofing) ─────────────────────────
  post-release-summary:
    name: Post-release summary
    runs-on: ubuntu-latest
    needs: github-release

    steps:
      - name: Release summary
        run: |
          echo "## Release complete: ${{ github.ref_name }}"
          echo "Published to npm: https://www.npmjs.com/package/universal-parser"
          echo "GitHub Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
